name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/jullury/akama/internal/config.GitHubClientID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }} \
              -X github.com/jullury/akama/internal/config.GitHubClientSecret=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }} \
              -X github.com/jullury/akama/internal/config.GitLabClientID=${{ secrets.OAUTH_GITLAB_CLIENT_ID }} \
              -X github.com/jullury/akama/internal/config.GitLabClientSecret=${{ secrets.OAUTH_GITLAB_CLIENT_SECRET }}" \
            -o akama-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akama-${{ matrix.goos }}-${{ matrix.goarch }}
          path: akama-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: akama-*
          generate_release_notes: true
