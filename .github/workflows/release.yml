name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run semantic-release

      - name: Get released version
        id: get-version
        run: |
          git fetch --tags
          version=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/jullury/akama/internal/config.GitHubClientID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }} \
              -X github.com/jullury/akama/internal/config.GitHubClientSecret=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }} \
              -X github.com/jullury/akama/internal/config.GitLabClientID=${{ secrets.OAUTH_GITLAB_CLIENT_ID }} \
              -X github.com/jullury/akama/internal/config.GitLabClientSecret=${{ secrets.OAUTH_GITLAB_CLIENT_SECRET }} \
              -X github.com/jullury/akama/internal/config.Version=$VERSION \
              -X github.com/jullury/akama/internal/config.BuildTime=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
              -X github.com/jullury/akama/internal/config.BuildPlatform=${{ matrix.goos }}/${{ matrix.goarch }}" \
            -o akama-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: gh release upload "v$VERSION" "akama-${{ matrix.goos }}-${{ matrix.goarch }}" --clobber

  build-docker:
    name: Build and push Docker image
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jullury/akama-daemon:latest
            ghcr.io/jullury/akama-daemon:${{ needs.release.outputs.version }}
          build-args: |
            GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
            GITLAB_CLIENT_ID=${{ secrets.OAUTH_GITLAB_CLIENT_ID }}
            GITLAB_CLIENT_SECRET=${{ secrets.OAUTH_GITLAB_CLIENT_SECRET }}
            VERSION=${{ needs.release.outputs.version }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            BUILD_PLATFORM=linux/amd64
